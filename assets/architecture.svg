<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="AWS CLI to SeaweedFS architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#151b2f"/>
    </linearGradient>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #eaf2ff; }
      .subtitle { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #b6c4e2; }
      .label { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #eaf2ff; }
      .small { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #b6c4e2; }
      .box { fill: #1c2540; stroke: #6ea8fe; stroke-width: 2; rx: 12; }
      .box2 { fill: #1f2d1f; stroke: #5ad27f; stroke-width: 2; rx: 12; }
      .box3 { fill: #2a213b; stroke: #c084fc; stroke-width: 2; rx: 12; }
      .arrow { stroke: #93c5fd; stroke-width: 2.5; fill: none; marker-end: url(#m); }
      .arrow2 { stroke: #86efac; stroke-width: 2.5; fill: none; marker-end: url(#m2); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#93c5fd"/>
    </marker>
    <marker id="m2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#86efac"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="520" fill="url(#bg)"/>

  <text x="40" y="50" class="title">AWS CLI Access Path to SeaweedFS S3 (Local Kubernetes)</text>
  <text x="40" y="78" class="subtitle">Profile: local-s3 | Endpoint: http://192.168.0.17:8333 | Service: seaweedfs-s3</text>

  <rect x="50" y="140" width="180" height="90" class="box"/>
  <text x="75" y="175" class="label">User Shell</text>
  <text x="75" y="198" class="small">macOS host</text>

  <rect x="280" y="140" width="220" height="90" class="box"/>
  <text x="305" y="175" class="label">AWS CLI</text>
  <text x="305" y="198" class="small">AWS_PROFILE=local-s3</text>

  <rect x="560" y="120" width="260" height="130" class="box3"/>
  <text x="585" y="165" class="label">MetalLB LoadBalancer</text>
  <text x="585" y="188" class="small">192.168.0.17:8333</text>
  <text x="585" y="208" class="small">L2 advertisement</text>

  <rect x="880" y="140" width="260" height="90" class="box"/>
  <text x="905" y="175" class="label">K8s Service</text>
  <text x="905" y="198" class="small">seaweedfs-s3 :8333</text>

  <rect x="840" y="320" width="150" height="80" class="box2"/>
  <text x="868" y="352" class="label">Filer Pod</text>
  <text x="868" y="374" class="small">S3 API</text>

  <rect x="1010" y="320" width="150" height="80" class="box2"/>
  <text x="1030" y="352" class="label">Master</text>
  <text x="1030" y="374" class="small">Metadata</text>

  <rect x="840" y="420" width="150" height="70" class="box2"/>
  <text x="862" y="450" class="label">Volume</text>
  <text x="862" y="470" class="small">Object data</text>

  <path d="M230 185 L280 185" class="arrow"/>
  <path d="M500 185 L560 185" class="arrow"/>
  <path d="M820 185 L880 185" class="arrow"/>

  <path d="M1010 230 L920 320" class="arrow2"/>
  <path d="M1060 230 L1085 320" class="arrow2"/>
  <path d="M915 400 L915 420" class="arrow2"/>

  <text x="370" y="165" class="small">--endpoint-url</text>
  <text x="630" y="108" class="small">External access entrypoint</text>
</svg>
